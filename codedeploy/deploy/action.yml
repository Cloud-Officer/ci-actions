---
name: 'Deploy'
description: 'Deploy to code deploy target group'

inputs:
  github-token:
    description: 'github token'
    required: false
    default: ${{ github.token }}
  aws-access-key-id:
    description: 'aws access key id'
    required: true
  aws-secret-access-key:
    description: 'aws secret access key'
    required: true
  aws-region:
    description: 'aws region'
    required: true
  application-name:
    description: 'aws deploy application name'
    required: true
  deployment-group-name:
    description: 'aws deploy deployment group name'
    required: true
  s3-bucket:
    description: 'aws deploy s3 bucket'
    required: true
  s3-key:
    description: 'aws deploy s3 key'
    required: true
  deployment-strategy:
    description: 'aws deploy deployment strategy'
    required: false
    default: 'CodeDeployDefault.OneAtATime'
  monitor-timeout-minutes:
    description: 'how long to poll CodeDeploy before failing the step'
    required: false
    default: '30'
runs:
  using: 'composite'
  steps:
    # https://github.com/marketplace/actions/configure-aws-credentials-action-for-github-actions
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws-region }}

    - name: Deploy to CodeDeploy
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        APPLICATION_NAME: ${{ inputs.application-name }}
        DEPLOYMENT_GROUP_NAME: ${{ inputs.deployment-group-name }}
        S3_BUCKET: ${{ inputs.s3-bucket }}
        S3_KEY: ${{ inputs.s3-key }}
        DEPLOYMENT_STRATEGY: ${{ inputs.deployment-strategy }}
        MONITOR_TIMEOUT_MINUTES: ${{ inputs.monitor-timeout-minutes }}
      run: bash "${GITHUB_ACTION_PATH}/deploy.sh"
