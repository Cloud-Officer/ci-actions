---
name: 'Bandit'
description: 'Execute bandit'

inputs:
  linters:
    description: 'List of all enabled linters'
    required: true
  ssh-key:
    description: 'ssh key'
    required: true
  github-token:
    description: 'github token'
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - id: check
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        LINTERS: ${{ inputs.linters }}
      run: bash "${GITHUB_ACTION_PATH}/../_lib/check_enabled.sh" BANDIT

    # https://github.com/marketplace/actions/checkout
    - name: Checkout
      uses: actions/checkout@v7
      if: ${{ steps.check.outputs.continue == 'true' }}
      with:
        token: ${{ inputs.github-token }}
        ssh-key: ${{ inputs.ssh-key }}
        persist-credentials: false
        lfs: true
        submodules: recursive

    # https://github.com/marketplace/actions/setup-python
    - name: Setup Python
      uses: actions/setup-python@v6
      if: ${{ steps.check.outputs.continue == 'true' }}
      with:
        python-version: '3.x'

    # https://github.com/PyCQA/bandit
    # Installed directly rather than via tj-actions/bandit: the tj-actions org
    # was compromised (CVE-2025-30066), so we avoid that supply-chain path and
    # mirror how flake8/semgrep are installed in this repo.
    - name: Install bandit
      shell: bash
      if: ${{ steps.check.outputs.continue == 'true' }}
      run: pip install bandit

    - name: Run bandit
      shell: bash
      if: ${{ steps.check.outputs.continue == 'true' }}
      run: bandit -ll --ini .bandit --silent .
