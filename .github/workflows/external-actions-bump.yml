# HAND-MAINTAINED — intentionally NOT generated by github-build. Weekly cron
# that bumps external (non-cloud-officer) action references inside this repo's
# composite actions and hand-maintained workflows, then opens one PR for human
# review. Consumer repos do not need it, so it is specific to this repository
# (issue #212).
---
name: External actions bump
'on':
  schedule:
  - cron: '0 6 * * 1'
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: external-actions-bump
  cancel-in-progress: false
jobs:
  bump:
    name: Bump external action references
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        # PAT (repo + workflow scope) so workflow-file edits can be pushed and
        # the resulting PR triggers this repo's own CI.
        token: ${{ secrets.GH_PAT }}
        persist-credentials: true
    - name: Resolve, apply and open PR
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        set -euo pipefail

        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'

        branch='automated/bump-external-actions'
        base="$(gh repo view --json defaultBranchRef --jq '.defaultBranchRef.name')"
        body_file="$(mktemp)"

        scripts/bump-external-actions.sh --apply --pr-body-file "${body_file}"

        if git diff --quiet; then
          echo 'No external action bumps available.'
          exit 0
        fi

        git checkout -B "${branch}"
        git add -A
        git commit -m 'Bump external action references'
        git push --force origin "${branch}"

        if gh pr view "${branch}" --json state --jq '.state' 2>/dev/null | grep -qx 'OPEN'; then
          echo "Existing PR for ${branch} updated in place."
        else
          gh pr create \
            --base "${base}" \
            --head "${branch}" \
            --title 'Bump external action references' \
            --body-file "${body_file}"
        fi
