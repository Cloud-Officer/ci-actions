# HAND-MAINTAINED — intentionally NOT generated by github-build. This workflow
# smoke-tests ci-actions' own composite actions; consumer repos do not need it,
# so it is specific to this repository and safe from workflow regeneration.
---
name: Smoke
'on':
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
  push:
    branches:
    - master
permissions:
  contents: read
concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true
jobs:
  action-contracts:
    name: Action contracts (all 28)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - name: Install PyYAML
      shell: bash
      run: pip install pyyaml
    - name: Validate every action.yml
      shell: bash
      run: python3 tests/action_contracts.py
    - name: Assert the Trivy lock-file list stays single-sourced
      shell: bash
      run: python3 tests/lock_file_contract.py

  linters-smoke:
    name: Linter actions (disabled path)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        persist-credentials: false
    # Each linter is invoked with an empty `linters` list so the shared
    # check_enabled.sh gate resolves to continue=false and every downstream
    # step is skipped. This exercises action.yml load + the QUAL-001 shared
    # gate end-to-end for all 19 without needing any linter toolchain.
    - name: actionlint
      uses: ./linters/actionlint
      with:
        linters: ''
        ssh-key: ''
    - name: bandit
      uses: ./linters/bandit
      with:
        linters: ''
        ssh-key: ''
    - name: cfnlint
      uses: ./linters/cfnlint
      with:
        linters: ''
        ssh-key: ''
    - name: eslint
      uses: ./linters/eslint
      with:
        linters: ''
        ssh-key: ''
    - name: flake8
      uses: ./linters/flake8
      with:
        linters: ''
        ssh-key: ''
    - name: golangci
      uses: ./linters/golangci
      with:
        linters: ''
        ssh-key: ''
    - name: hadolint
      uses: ./linters/hadolint
      with:
        linters: ''
        ssh-key: ''
    - name: ktlint
      uses: ./linters/ktlint
      with:
        linters: ''
        ssh-key: ''
    - name: markdownlint
      uses: ./linters/markdownlint
      with:
        linters: ''
        ssh-key: ''
    - name: phpcs
      uses: ./linters/phpcs
      with:
        linters: ''
        ssh-key: ''
    - name: phpstan
      uses: ./linters/phpstan
      with:
        linters: ''
        ssh-key: ''
        # phpstan gates a couple of steps on these inputs independently of the
        # linter-enabled gate; pin them to 'none' so the disabled path is a
        # true no-op (no PHP/composer setup required).
        apt-packages: 'none'
        php-version: 'none'
    - name: pmd
      uses: ./linters/pmd
      with:
        linters: ''
        ssh-key: ''
    - name: protolint
      uses: ./linters/protolint
      with:
        linters: ''
        ssh-key: ''
    - name: rubocop
      uses: ./linters/rubocop
      with:
        linters: ''
        ssh-key: ''
    - name: semgrep
      uses: ./linters/semgrep
      with:
        linters: ''
        ssh-key: ''
    - name: shellcheck
      uses: ./linters/shellcheck
      with:
        linters: ''
        ssh-key: ''
    - name: swiftlint
      uses: ./linters/swiftlint
      with:
        linters: ''
        ssh-key: ''
    - name: trivy
      uses: ./linters/trivy
      with:
        linters: ''
        ssh-key: ''
    - name: yamllint
      uses: ./linters/yamllint
      with:
        linters: ''
        ssh-key: ''
    # The 19 invocations above only prove the actions load and run the gate;
    # they would still pass green if check_enabled.sh were flipped to
    # continue=true (checkout + reviewdog would simply run). Assert the gate
    # output directly so a regression in the shared QUAL-001 gate fails here.
    - name: Assert check_enabled.sh gate output
      shell: bash
      run: |
        set -euo pipefail
        gate="linters/_lib/check_enabled.sh"
        run_gate() { # LINTERS_VALUE LINTER_NAME -> echoes continue=...
          local out
          out="$(mktemp)"
          LINTERS="$1" GITHUB_OUTPUT="${out}" bash "${gate}" "$2"
          cat "${out}"
        }
        # Disabled path (the path the smoke invocations above exercise): an
        # empty list must resolve to continue=false.
        got="$(run_gate '' ACTIONLINT)"
        test "${got}" = 'continue=false' \
          || { echo "::error::empty LINTERS should disable ACTIONLINT, got '${got}'"; exit 1; }
        # Disabled path: a non-empty list that omits the linter -> continue=false.
        got="$(run_gate 'SHELLCHECK' ACTIONLINT)"
        test "${got}" = 'continue=false' \
          || { echo "::error::ACTIONLINT absent from LINTERS should disable it, got '${got}'"; exit 1; }
        # Enabled path: a list containing the linter -> continue=true.
        got="$(run_gate 'ACTIONLINT SHELLCHECK' ACTIONLINT)"
        test "${got}" = 'continue=true' \
          || { echo "::error::ACTIONLINT present in LINTERS should enable it, got '${got}'"; exit 1; }
        echo "check_enabled.sh gate OK (disabled, absent, enabled paths verified)"

  variables-smoke:
    name: Variables action
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        persist-credentials: false
    - name: Run variables action
      id: vars
      uses: ./variables
      with:
        ssh-key: ''
    - name: Assert outputs are populated
      shell: bash
      env:
        BUILD_NAME: ${{ steps.vars.outputs.BUILD_NAME }}
        BUILD_VERSION: ${{ steps.vars.outputs.BUILD_VERSION }}
      run: |
        set -euo pipefail
        test -n "${BUILD_NAME}" || { echo "::error::BUILD_NAME is empty"; exit 1; }
        test -n "${BUILD_VERSION}" || { echo "::error::BUILD_VERSION is empty"; exit 1; }
        echo "variables OK: ${BUILD_NAME}"
